# ─── Netlify Configuration for SoulSeer ──────────────────────────────────────
# Build settings, redirects, and serverless function config

[build]
  command = "npm run build"
  publish = "client/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # Omit publishable keys from secrets scanning to prevent false positives
  SECRETS_SCAN_OMIT_KEYS = "VITE_AGORA_APP_ID,VITE_STRIPE_PUBLISHABLE_KEY,STRIPE_PUBLISHABLE_KEY,AGORA_APP_ID"

# ─── Redirects ───────────────────────────────────────────────────────────────
# Order matters: more specific rules first, SPA fallback last.

# API proxy — forward /api/* to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — all non-API, non-asset routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security headers ───────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'none'"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=self, microphone=self, geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Functions config ────────────────────────────────────────────────────────
[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"
  # Include server compiled output in the function bundle
  included_files = ["server/dist/**"]
